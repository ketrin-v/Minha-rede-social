<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar Conta — SocialNet</title>
  <style>
    :root {
      --primary:    #4f46e5;
      --accent:     #ec4899;
      --bg:         #f1f5f9;
      --text:       #1e293b;
      --muted:      #64748b;
      --border:     #e2e8f0;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      margin: 0; padding: 20px;
    }

    .register-card {
      background: #fff; padding: 40px; border-radius: 24px;
      width: 100%; max-width: 420px; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
      text-align: center;
    }

    .logo { font-size: 2.5rem; font-weight: 800; color: var(--primary); margin-bottom: 5px; }
    .logo span { color: var(--accent); }
    .subtitle { color: var(--muted); margin-bottom: 30px; font-size: 0.95rem; }

    .input-group { text-align: left; margin-bottom: 20px; }
    .input-group label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; }
    .input-group input {
      width: 100%; padding: 14px 16px; border-radius: 12px;
      border: 2px solid var(--border); outline: none; transition: border-color 0.2s;
    }
    .input-group input:focus { border-color: var(--primary); }

    .btn-register {
      width: 100%; background: var(--primary); color: #fff; border: none;
      padding: 14px; border-radius: 12px; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-register:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 70, 229, 0.3); }

    .btn-google {
      width: 100%; background: #fff; color: #444; border: 2px solid var(--border);
      padding: 12px; border-radius: 12px; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; margin-top: 15px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }

    .divider { margin: 25px 0; display: flex; align-items: center; color: var(--muted); font-size: 0.8rem; }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); margin: 0 10px; }

    .footer-link { margin-top: 25px; font-size: 0.9rem; color: var(--muted); }
    .footer-link a { color: var(--primary); font-weight: 700; text-decoration: none; }

    #toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: #1e293b; color: #fff; padding: 12px 24px; border-radius: 12px;
      opacity: 0; transition: all 0.3s; pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
  </style>
</head>
<body>

<div class="register-card">
  <div class="logo">Social<span>Net</span></div>
  <p class="subtitle">Crie sua conta e comece a interagir!</p>

  <button class="btn-google" onclick="showToast('Conectando com o Google... 🌐')">
    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20" alt="Google">
    Cadastrar com o Google
  </button>

  <div class="divider">ou preencha os dados</div>

  <div class="input-group">
    <label>Nome Completo</label>
    <input type="text" id="regName" placeholder="Ex: Ketrin Vitória">
  </div>

  <div class="input-group">
    <label>Nome de Usuário</label>
    <input type="text" id="regUser" placeholder="Ex: ketrin_v">
  </div>

  <div class="input-group">
    <label>Senha</label>
    <input type="password" id="regPass" placeholder="Mínimo 6 caracteres">
  </div>

  <button class="btn-register" onclick="handleRegister()">Criar Minha Conta</button>

  <div class="footer-link">
    Já tem uma conta? <a href="index.html">Fazer Login</a>
  </div>
</div>

<div id="toast"></div>

<script>
  function handleRegister() {
    const name = document.getElementById('regName').value;
    const user = document.getElementById('regUser').value;
    const pass = document.getElementById('regPass').value;

    if (!name || !user || !pass) {
      showToast('⚠️ Por favor, preencha todos os campos!');
      return;
    }

    showToast('Conta criada com sucesso! Redirecionando... 🎉');
    
    // Simula salvamento e redirecionamento para o index com o nome do usuário
    setTimeout(() => {
      window.location.href = `index.html?newUser=${encodeURIComponent(name)}`;
    }, 2000);
  }

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  }
</script>

</body>
</html>
