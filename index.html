<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialNet — Sua Rede Social</title>
  <style>
    /* ===== RESET & VARIÁVEIS ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:    #4f46e5;
      --primary-dk: #3730a3;
      --accent:     #ec4899;
      --bg:         #f1f5f9;
      --card:       #ffffff;
      --text:       #1e293b;
      --muted:      #64748b;
      --border:     #e2e8f0;
      --radius:     12px;
      --shadow:     0 2px 12px rgba(0,0,0,.08);
      --nav-h:      60px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== NAVBAR ===== */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: var(--primary);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
      z-index: 100;
    }
    .nav-logo {
      font-size: 1.4rem; font-weight: 800; color: #fff;
      letter-spacing: -0.5px;
    }
    .nav-logo span { color: #a5b4fc; }
    .nav-search {
      flex: 1; max-width: 360px; margin: 0 24px;
      position: relative;
    }
    .nav-search input {
      width: 100%; padding: 8px 16px 8px 40px;
      border-radius: 999px; border: none;
      background: rgba(255,255,255,.18); color: #fff;
      font-size: .9rem; outline: none;
    }
    .nav-search input::placeholder { color: rgba(255,255,255,.7); }
    .nav-search .icon-search {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,.7); font-size: 1rem;
    }
    .nav-actions { display: flex; align-items: center; gap: 12px; }
    .nav-btn {
      background: rgba(255,255,255,.15); border: none; color: #fff;
      border-radius: 999px; padding: 6px 16px;
      font-size: .85rem; cursor: pointer; transition: background .2s;
    }
    .nav-btn:hover { background: rgba(255,255,255,.28); }
    .nav-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      object-fit: cover; border: 2px solid #a5b4fc; cursor: pointer;
    }

    /* ===== LAYOUT ===== */
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr 280px;
      gap: 20px;
      max-width: 1200px;
      margin: calc(var(--nav-h) + 20px) auto 40px;
      padding: 0 16px;
    }
    @media (max-width: 1024px) {
      .layout { grid-template-columns: 220px 1fr; }
      .sidebar-right { display: none; }
    }
    @media (max-width: 680px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar-left { display: none; }
    }

    /* ===== CARDS GENÉRICOS ===== */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .card-header {
      padding: 14px 18px;
      font-weight: 700; font-size: .95rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-body { padding: 16px 18px; }

    /* ===== SIDEBAR ESQUERDA ===== */
    .sidebar-left { display: flex; flex-direction: column; gap: 16px; }

    .profile-card { text-align: center; }
    .profile-cover {
      height: 80px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
    }
    .profile-avatar-wrap {
      margin-top: -36px;
      display: flex; justify-content: center;
    }
    .profile-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      border: 3px solid #fff; object-fit: cover;
    }
    .profile-name { margin-top: 8px; font-weight: 700; font-size: 1rem; }
    .profile-bio { font-size: .82rem; color: var(--muted); margin: 4px 0 12px; }
    .profile-stats {
      display: flex; justify-content: space-around;
      border-top: 1px solid var(--border); padding-top: 12px;
    }
    .stat { text-align: center; }
    .stat-num { font-weight: 700; font-size: 1rem; }
    .stat-lbl { font-size: .72rem; color: var(--muted); }

    .menu-list { list-style: none; }
    .menu-list li a {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      text-decoration: none; color: var(--text);
      font-size: .9rem; transition: background .15s;
    }
    .menu-list li a:hover, .menu-list li a.active {
      background: #ede9fe; color: var(--primary);
    }
    .menu-list li a .ico { font-size: 1.1rem; }
    .badge {
      margin-left: auto; background: var(--accent); color: #fff;
      font-size: .7rem; font-weight: 700;
      padding: 2px 7px; border-radius: 999px;
    }

    /* ===== FEED CENTRAL ===== */
    .feed { display: flex; flex-direction: column; gap: 16px; }

    /* Caixa de nova publicação */
    .new-post-card .card-body { display: flex; flex-direction: column; gap: 12px; }
    .new-post-top { display: flex; gap: 10px; align-items: flex-start; }
    .new-post-top img {
      width: 42px; height: 42px; border-radius: 50%; object-fit: cover; flex-shrink: 0;
    }
    .new-post-top textarea {
      flex: 1; border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 14px; font-size: .9rem; resize: none;
      font-family: inherit; outline: none; transition: border .2s;
      min-height: 72px;
    }
    .new-post-top textarea:focus { border-color: var(--primary); }
    .new-post-actions {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 8px;
    }
    .post-tools { display: flex; gap: 8px; }
    .tool-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: .85rem;
      display: flex; align-items: center; gap: 4px;
      padding: 6px 10px; border-radius: 8px; transition: background .15s;
    }
    .tool-btn:hover { background: var(--bg); color: var(--primary); }
    .btn-publish {
      background: var(--primary); color: #fff;
      border: none; border-radius: 999px;
      padding: 8px 22px; font-size: .88rem; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    .btn-publish:hover { background: var(--primary-dk); }

    /* Post individual */
    .post-card {}
    .post-header {
      padding: 14px 18px 0;
      display: flex; align-items: center; gap: 10px;
    }
    .post-avatar {
      width: 44px; height: 44px; border-radius: 50%; object-fit: cover;
    }
    .post-meta { flex: 1; }
    .post-author { font-weight: 700; font-size: .92rem; }
    .post-time { font-size: .76rem; color: var(--muted); }
    .post-menu-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1.2rem; padding: 4px 8px;
      border-radius: 6px; transition: background .15s;
    }
    .post-menu-btn:hover { background: var(--bg); }
    .post-text { padding: 12px 18px; font-size: .93rem; line-height: 1.55; }
    .post-image {
      width: 100%; max-height: 380px; object-fit: cover;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .post-counts {
      padding: 8px 18px;
      display: flex; justify-content: space-between;
      font-size: .8rem; color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .post-actions {
      display: flex; justify-content: space-around;
      padding: 4px 8px;
    }
    .action-btn {
      flex: 1; background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: .85rem;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 8px 4px; border-radius: 8px; transition: background .15s, color .15s;
      font-family: inherit;
    }
    .action-btn:hover { background: var(--bg); }
    .action-btn.liked { color: var(--accent); }
    .action-btn.liked:hover { background: #fce7f3; }

    /* Comentários */
    .comments-section {
      border-top: 1px solid var(--border);
      padding: 12px 18px;
      display: none;
      flex-direction: column; gap: 10px;
    }
    .comments-section.open { display: flex; }
    .comment {
      display: flex; gap: 8px; align-items: flex-start;
    }
    .comment img {
      width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0;
    }
    .comment-bubble {
      background: var(--bg); border-radius: 10px;
      padding: 8px 12px; font-size: .84rem; flex: 1;
    }
    .comment-author { font-weight: 700; font-size: .8rem; margin-bottom: 2px; }
    .comment-input-row {
      display: flex; gap: 8px; align-items: center; margin-top: 4px;
    }
    .comment-input-row img {
      width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0;
    }
    .comment-input {
      flex: 1; border: 1px solid var(--border); border-radius: 999px;
      padding: 7px 14px; font-size: .84rem; outline: none;
      font-family: inherit; transition: border .2s;
    }
    .comment-input:focus { border-color: var(--primary); }
    .comment-send {
      background: var(--primary); color: #fff; border: none;
      border-radius: 50%; width: 32px; height: 32px;
      cursor: pointer; font-size: .9rem; transition: background .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .comment-send:hover { background: var(--primary-dk); }

    /* ===== SIDEBAR DIREITA ===== */
    .sidebar-right { display: flex; flex-direction: column; gap: 16px; }

    .suggestion-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0;
    }
    .suggestion-item:not(:last-child) { border-bottom: 1px solid var(--border); }
    .suggestion-item img {
      width: 40px; height: 40px; border-radius: 50%; object-fit: cover;
    }
    .suggestion-info { flex: 1; }
    .suggestion-name { font-weight: 600; font-size: .88rem; }
    .suggestion-mutual { font-size: .75rem; color: var(--muted); }
    .btn-follow {
      background: none; border: 2px solid var(--primary);
      color: var(--primary); border-radius: 999px;
      padding: 4px 14px; font-size: .78rem; font-weight: 600;
      cursor: pointer; transition: all .2s;
    }
    .btn-follow:hover, .btn-follow.following {
      background: var(--primary); color: #fff;
    }

    .trend-item {
      padding: 8px 0;
      cursor: pointer;
    }
    .trend-item:not(:last-child) { border-bottom: 1px solid var(--border); }
    .trend-tag { font-weight: 700; font-size: .88rem; color: var(--primary); }
    .trend-count { font-size: .76rem; color: var(--muted); }

    /* ===== STORIES ===== */
    .stories-row {
      display: flex; gap: 12px; overflow-x: auto; padding-bottom: 4px;
    }
    .stories-row::-webkit-scrollbar { height: 4px; }
    .stories-row::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .story {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      cursor: pointer; flex-shrink: 0;
    }
    .story-ring {
      width: 56px; height: 56px; border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, var(--accent), var(--primary));
    }
    .story-ring img {
      width: 100%; height: 100%; border-radius: 50%;
      border: 2px solid #fff; object-fit: cover;
    }
    .story-name { font-size: .72rem; color: var(--muted); max-width: 60px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .story-add .story-ring {
      background: var(--bg); border: 2px dashed var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; color: var(--primary);
    }

    /* ===== MODAL DE STORY ===== */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.75); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .story-modal {
      background: #000; border-radius: 16px;
      width: 340px; max-width: 95vw;
      overflow: hidden; position: relative;
    }
    .story-modal img { width: 100%; height: 520px; object-fit: cover; }
    .story-modal-info {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 14px 16px;
      background: linear-gradient(to bottom, rgba(0,0,0,.5), transparent);
      display: flex; align-items: center; gap: 10px;
    }
    .story-modal-info img {
      width: 36px; height: 36px; border-radius: 50%; border: 2px solid #fff;
    }
    .story-modal-name { color: #fff; font-weight: 700; font-size: .9rem; }
    .story-modal-time { color: rgba(255,255,255,.7); font-size: .75rem; }
    .story-close {
      position: absolute; top: 12px; right: 12px;
      background: rgba(0,0,0,.4); border: none; color: #fff;
      border-radius: 50%; width: 30px; height: 30px;
      font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .story-progress {
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: rgba(255,255,255,.3);
    }
    .story-progress-bar {
      height: 100%; background: #fff;
      animation: progress 5s linear forwards;
    }
    @keyframes progress { from { width: 0; } to { width: 100%; } }

    /* ===== TOAST ===== */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #1e293b; color: #fff; padding: 10px 22px;
      border-radius: 999px; font-size: .88rem;
      opacity: 0; pointer-events: none;
      transition: opacity .3s;
      z-index: 300;
    }
    #toast.show { opacity: 1; }

    /* ===== SCROLLBAR GLOBAL ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>

  <!-- ===== SIDEBAR DIREITA ===== -->

</div>

  ];

  /* ============================================================
     RENDERIZAÇÃO
  ============================================================ */

  function timeAgo(date) {
    const diff = Math.floor((Date.now() - date) / 1000);
    if (diff < 60)  return 'agora mesmo';
    if (diff < 3600) return Math.floor(diff/60) + ' min atrás';
    if (diff < 86400) return Math.floor(diff/3600) + ' h atrás';
    return Math.floor(diff/86400) + ' d atrás';
  }

  function renderPost(post) {
    const commentsHTML = post.comments.map(c => `
      <div class="comment">
        <img src="${c.user.avatar}" alt="${c.user.name}" />
        <div class="comment-bubble">
          <div class="comment-author">${c.user.name}</div>
          ${c.text}
        </div>
      </div>
    `).join('');

    return `
      <div class="card post-card" id="post-${post.id}">
        <div class="post-header">
          <img class="post-avatar" src="${post.user.avatar}" alt="${post.user.name}" />
          <div class="post-meta">
            <div class="post-author">${post.user.name}</div>
            <div class="post-time">${post.time}</div>
          </div>
          <button class="post-menu-btn" onclick="showToast('Opções em breve!')">⋯</button>
        </div>
        <div class="post-text">${post.text}</div>
        ${post.image ? `<img class="post-image" src="${post.image}" alt="Post" loading="lazy" />` : ''}
        <div class="post-counts">
          <span id="like-count-${post.id}">${post.likes} curtidas</span>
          <span onclick="toggleComments(${post.id})" style="cursor:pointer">${post.comments.length} comentário${post.comments.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="post-actions">
          <button class="action-btn ${post.liked ? 'liked' : ''}" id="like-btn-${post.id}" onclick="toggleLike(${post.id})">
            ❤️ Curtir
          </button>
          <button class="action-btn" onclick="toggleComments(${post.id})">
            💬 Comentar
          </button>
          <button class="action-btn" onclick="sharePost(${post.id})">
            🔗 Compartilhar
          </button>
        </div>
        <div class="comments-section" id="comments-${post.id}">
          <div id="comments-list-${post.id}">${commentsHTML}</div>
          <div class="comment-input-row">
            <img src="${ME.avatar}" alt="Você" />
            <input class="comment-input" id="comment-input-${post.id}" type="text" placeholder="Escreva um comentário..." onkeydown="if(event.key==='Enter') addComment(${post.id})" />
            <button class="comment-send" onclick="addComment(${post.id})">➤</button>
          </div>
        </div>
      </div>
    `;
  }

  function renderAllPosts() {
    const feed = document.getElementById('feed');
    // Remove posts antigos (mantém stories e new-post)
    const oldPosts = feed.querySelectorAll('.post-card');
    oldPosts.forEach(p => p.remove());

    posts.forEach(post => {
      feed.insertAdjacentHTML('beforeend', renderPost(post));
    });
  }

  function renderStories() {
    const row = document.getElementById('storiesRow');
    STORIES_DATA.forEach((s, i) => {
      row.insertAdjacentHTML('beforeend', `
        <div class="story" onclick="openStory(${i})">
          <div class="story-ring"><img src="${s.user.avatar}" alt="${s.user.name}" /></div>
          <span class="story-name">${s.user.name.split(' ')[0]}</span>
        </div>
      `);
    });
  }

  function renderSuggestions() {
    const el = document.getElementById('suggestions');
    el.innerHTML = SUGGESTIONS.map((s, i) => `
      <div class="suggestion-item">
        <img src="${s.user.avatar}" alt="${s.user.name}" />
        <div class="suggestion-info">
          <div class="suggestion-name">${s.user.name}</div>
          <div class="suggestion-mutual">${s.mutual}</div>
        </div>
        <button class="btn-follow" id="follow-${i}" onclick="toggleFollow(${i})">Seguir</button>
      </div>
    `).join('');
  }

  function renderTrending() {
    const el = document.getElementById('trending');
    el.innerHTML = TRENDS.map(t => `
      <div class="trend-item" onclick="showToast('Explorando ${t.tag}...')">
        <div class="trend-tag">${t.tag}</div>
        <div class="trend-count">${t.count}</div>
      </div>
    `).join('');
  }

  /* ============================================================
     AÇÕES
  ============================================================ */

  function toggleLike(id) {
    const post = posts.find(p => p.id === id);
    if (!post) return;
    post.liked = !post.liked;
    post.likes += post.liked ? 1 : -1;
    document.getElementById(`like-count-${id}`).textContent = `${post.likes} curtidas`;
    const btn = document.getElementById(`like-btn-${id}`);
    btn.classList.toggle('liked', post.liked);
    showToast(post.liked ? '❤️ Você curtiu este post!' : '💔 Curtida removida');
  }

  function toggleComments(id) {
    const section = document.getElementById(`comments-${id}`);
    section.classList.toggle('open');
    if (section.classList.contains('open')) {
      document.getElementById(`comment-input-${id}`).focus();
    }
  }

  function addComment(id) {
    const input = document.getElementById(`comment-input-${id}`);
    const text = input.value.trim();
    if (!text) return;

    const post = posts.find(p => p.id === id);
    post.comments.push({ user: { name: ME.name, avatar: ME.avatar }, text });

    const list = document.getElementById(`comments-list-${id}`);
    list.insertAdjacentHTML('beforeend', `
      <div class="comment">
        <img src="${ME.avatar}" alt="${ME.name}" />
        <div class="comment-bubble">
          <div class="comment-author">${ME.name}</div>
          ${text}
        </div>
      </div>
    `);

    // Atualiza contagem
    const countEl = document.getElementById(`post-${id}`).querySelector('.post-counts span:last-child');
    countEl.textContent = `${post.comments.length} comentário${post.comments.length !== 1 ? 's' : ''}`;

    input.value = '';
    showToast('💬 Comentário publicado!');
  }

  function publishPost() {
    const textarea = document.getElementById('newPostText');
    const text = textarea.value.trim();
    if (!text) { showToast('✏️ Escreva algo antes de publicar!'); return; }

    const newPost = {
      id: Date.now(),
      user: { name: ME.name, avatar: ME.avatar },
      time: 'agora mesmo',
      text,
      image: null,
      likes: 0,
      liked: false,
      comments: []
    };

    posts.unshift(newPost);
    textarea.value = '';

    // Insere após o card de nova publicação
    const newPostCard = document.querySelector('.new-post-card');
    newPostCard.insertAdjacentHTML('afterend', renderPost(newPost));

    // Atualiza contador de posts
    const countEl = document.getElementById('postCount');
    countEl.textContent = parseInt(countEl.textContent) + 1;

    showToast('🎉 Post publicado com sucesso!');
  }

  function sharePost(id) {
    showToast('🔗 Link copiado para a área de transferência!');
  }

  function toggleFollow(i) {
    const btn = document.getElementById(`follow-${i}`);
    const isFollowing = btn.classList.toggle('following');
    btn.textContent = isFollowing ? 'Seguindo ✓' : 'Seguir';
    showToast(isFollowing ? `✅ Você está seguindo ${SUGGESTIONS[i].user.name}!` : `❌ Você deixou de seguir ${SUGGESTIONS[i].user.name}`);
  }

  /* ============================================================
     STORIES
  ============================================================ */
  let storyTimer = null;

  function openStory(i) {
    const s = STORIES_DATA[i];
    document.getElementById('storyImg').src = s.img;
    document.getElementById('storyAvatar').src = s.user.avatar;
    document.getElementById('storyName').textContent = s.user.name;
    document.getElementById('storyModal').classList.add('open');

    // Reinicia barra de progresso
    const bar = document.getElementById('storyBar');
    bar.style.animation = 'none';
    bar.offsetHeight; // reflow
    bar.style.animation = '';

    clearTimeout(storyTimer);
    storyTimer = setTimeout(() => {
      document.getElementById('storyModal').classList.remove('open');
    }, 5000);
  }

  function closeStory(e) {
    if (e.target === document.getElementById('storyModal')) {
      document.getElementById('storyModal').classList.remove('open');
      clearTimeout(storyTimer);
    }
  }

  /* ============================================================
     PESQUISA
  ============================================================ */
  document.getElementById('searchInput').addEventListener('input', function () {
    const q = this.value.toLowerCase().trim();
    if (!q) { renderAllPosts(); return; }
    const feed = document.getElementById('feed');
    const oldPosts = feed.querySelectorAll('.post-card');
    oldPosts.forEach(p => p.remove());
    const filtered = posts.filter(p =>
      p.text.toLowerCase().includes(q) || p.user.name.toLowerCase().includes(q)
    );
    if (filtered.length === 0) {
      feed.insertAdjacentHTML('beforeend', `<div class="card"><div class="card-body" style="text-align:center;color:var(--muted);padding:32px">Nenhum post encontrado para "<strong>${q}</strong>"</div></div>`);
    } else {
      filtered.forEach(post => feed.insertAdjacentHTML('beforeend', renderPost(post)));
    }
  });

  /* ============================================================
     TOAST
  ============================================================ */
  let toastTimer = null;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  }

  /* ============================================================
     INIT
  ============================================================ */
  renderStories();
  renderAllPosts();
  renderSuggestions();
  renderTrending();
</script>
</body>
</html>
