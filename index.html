<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialNet — Sua Rede Social (Avatares Estilizados)</title>
  <style>
    /* ===== RESET & VARIÁVEIS ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:    #4f46e5;
      --primary-dk: #3730a3;
      --accent:     #ec4899;
      --bg:         #f1f5f9;
      --card:       #ffffff;
      --text:       #1e293b;
      --muted:      #64748b;
      --border:     #e2e8f0;
      --radius:     12px;
      --shadow:     0 2px 12px rgba(0,0,0,.08);
      --nav-h:      60px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== NAVBAR ===== */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: var(--primary);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
      z-index: 100;
    }
    .nav-logo {
      font-size: 1.4rem; font-weight: 800; color: #fff;
      letter-spacing: -0.5px;
    }
    .nav-logo span { color: #a5b4fc; }
    .nav-search {
      flex: 1; max-width: 360px; margin: 0 24px;
      position: relative;
    }
    .nav-search input {
      width: 100%; padding: 8px 16px 8px 40px;
      border-radius: 999px; border: none;
      background: rgba(255,255,255,.18); color: #fff;
      font-size: .9rem; outline: none;
    }
    .nav-search input::placeholder { color: rgba(255,255,255,.7); }
    .nav-search .icon-search {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,.7); font-size: 1rem;
    }
    .nav-actions { display: flex; align-items: center; gap: 12px; }
    .nav-btn {
      background: rgba(255,255,255,.15); border: none; color: #fff;
      border-radius: 999px; padding: 6px 16px;
      font-size: .85rem; cursor: pointer; transition: background .2s;
    }
    .nav-btn:hover { background: rgba(255,255,255,.28); }

    /* ===== AVATAR SYSTEM (NO IMAGES) ===== */
    .avatar-box {
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      flex-shrink: 0;
      user-select: none;
    }
    .avatar-bg-circle {
      width: 100%; height: 100%;
      background: #e2e8f0;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
    }
    .avatar-emoji { font-size: 1.8em; z-index: 2; }
    .avatar-accessory {
      position: absolute; top: 5%; right: 5%;
      font-size: 0.9em; z-index: 3;
    }
    .avatar-shape {
      position: absolute; inset: 0;
      opacity: 0.2; z-index: 1;
    }

    /* Tamanhos */
    .avatar-xl { width: 72px; height: 72px; font-size: 24px; }
    .avatar-md { width: 44px; height: 44px; font-size: 16px; }
    .avatar-sm { width: 32px; height: 32px; font-size: 12px; }

    /* ===== LAYOUT ===== */
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr 280px;
      gap: 20px;
      max-width: 1200px;
      margin: calc(var(--nav-h) + 20px) auto 40px;
      padding: 0 16px;
    }
    @media (max-width: 1024px) {
      .layout { grid-template-columns: 220px 1fr; }
      .sidebar-right { display: none; }
    }
    @media (max-width: 680px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar-left { display: none; }
    }

    /* ===== CARDS GENÉRICOS ===== */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .card-header {
      padding: 14px 18px;
      font-weight: 700; font-size: .95rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-body { padding: 16px 18px; }

    /* ===== SIDEBAR ESQUERDA ===== */
    .sidebar-left { display: flex; flex-direction: column; gap: 16px; }

    .profile-card { text-align: center; }
    .profile-cover {
      height: 80px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
    }
    .profile-avatar-wrap {
      margin-top: -36px;
      display: flex; justify-content: center;
    }
    .profile-name { margin-top: 8px; font-weight: 700; font-size: 1rem; }
    .profile-bio { font-size: .82rem; color: var(--muted); margin: 4px 0 12px; }
    .profile-stats {
      display: flex; justify-content: space-around;
      border-top: 1px solid var(--border); padding-top: 12px;
    }
    .stat { text-align: center; }
    .stat-num { font-weight: 700; font-size: 1rem; }
    .stat-lbl { font-size: .72rem; color: var(--muted); }

    .menu-list { list-style: none; }
    .menu-list li a {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      text-decoration: none; color: var(--text);
      font-size: .9rem; transition: background .15s;
    }
    .menu-list li a:hover, .menu-list li a.active {
      background: #ede9fe; color: var(--primary);
    }
    .menu-list li a .ico { font-size: 1.1rem; }

    /* ===== FEED CENTRAL ===== */
    .feed { display: flex; flex-direction: column; gap: 16px; }

    /* Caixa de nova publicação */
    .new-post-card .card-body { display: flex; flex-direction: column; gap: 12px; }
    .new-post-top { display: flex; gap: 10px; align-items: flex-start; }
    .new-post-top textarea {
      flex: 1; border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 14px; font-size: .9rem; resize: none;
      font-family: inherit; outline: none; transition: border .2s;
      min-height: 72px;
    }
    .new-post-top textarea:focus { border-color: var(--primary); }
    .new-post-actions {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 8px;
    }
    .btn-publish {
      background: var(--primary); color: #fff;
      border: none; border-radius: 999px;
      padding: 8px 22px; font-size: .88rem; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    .btn-publish:hover { background: var(--primary-dk); }

    /* Seletor de Avatar */
    .avatar-selector {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-top: 10px; padding: 10px;
      background: var(--bg); border-radius: 8px;
    }
    .selector-label { font-size: 0.75rem; color: var(--muted); width: 100%; margin-bottom: 4px; }
    .opt-btn {
      background: #fff; border: 1px solid var(--border);
      padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;
    }
    .opt-btn.active { border-color: var(--primary); background: #ede9fe; color: var(--primary); }

    /* Post individual */
    .post-header {
      padding: 14px 18px 0;
      display: flex; align-items: center; gap: 10px;
    }
    .post-meta { flex: 1; }
    .post-author { font-weight: 700; font-size: .92rem; }
    .post-time { font-size: .76rem; color: var(--muted); }
    .post-text { padding: 12px 18px; font-size: .93rem; line-height: 1.55; }
    .post-counts {
      padding: 8px 18px;
      display: flex; justify-content: space-between;
      font-size: .8rem; color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .post-actions {
      display: flex; justify-content: space-around;
      padding: 4px 8px;
    }
    .action-btn {
      flex: 1; background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: .85rem;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 8px 4px; border-radius: 8px; transition: background .15s, color .15s;
      font-family: inherit;
    }
    .action-btn:hover { background: var(--bg); }
    .action-btn.liked { color: var(--accent); }

    /* Comentários */
    .comments-section {
      border-top: 1px solid var(--border);
      padding: 12px 18px;
      display: none;
      flex-direction: column; gap: 10px;
    }
    .comments-section.open { display: flex; }
    .comment { display: flex; gap: 8px; align-items: flex-start; }
    .comment-bubble {
      background: var(--bg); border-radius: 10px;
      padding: 8px 12px; font-size: .84rem; flex: 1;
    }
    .comment-author { font-weight: 700; font-size: .8rem; margin-bottom: 2px; }
    .comment-input-row { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
    .comment-input {
      flex: 1; border: 1px solid var(--border); border-radius: 999px;
      padding: 7px 14px; font-size: .84rem; outline: none;
      font-family: inherit;
    }
    .comment-send {
      background: var(--primary); color: #fff; border: none;
      border-radius: 50%; width: 32px; height: 32px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* ===== SIDEBAR DIREITA ===== */
    .sidebar-right { display: flex; flex-direction: column; gap: 16px; }
    .suggestion-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
    .suggestion-item:not(:last-child) { border-bottom: 1px solid var(--border); }
    .suggestion-info { flex: 1; }
    .suggestion-name { font-weight: 600; font-size: .88rem; }
    .btn-follow {
      background: none; border: 2px solid var(--primary);
      color: var(--primary); border-radius: 999px;
      padding: 4px 14px; font-size: .78rem; font-weight: 600;
      cursor: pointer;
    }

    /* ===== TOAST ===== */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #1e293b; color: #fff; padding: 10px 22px;
      border-radius: 999px; font-size: .88rem;
      opacity: 0; pointer-events: none;
      transition: opacity .3s;
      z-index: 300;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav>
  <div class="nav-logo">Social<span>Net</span></div>
  <div class="nav-search">
    <span class="icon-search">🔍</span>
    <input type="text" placeholder="Pesquisar..." id="searchInput" />
  </div>
  <div class="nav-actions">
    <button class="nav-btn" onclick="showToast('🔔 Sem notificações')">🔔</button>
    <div id="navMyAvatar"></div>
  </div>
</nav>

<!-- ===== LAYOUT PRINCIPAL ===== -->
<div class="layout">

  <!-- ===== SIDEBAR ESQUERDA ===== -->
  <aside class="sidebar-left">
    <div class="card profile-card">
      <div class="profile-cover"></div>
      <div class="profile-avatar-wrap" id="myAvatarLarge"></div>
      <div class="card-body" style="padding-top:8px;">
        <div class="profile-name">Ketrin Vitória</div>
        <div class="profile-bio">✨ Personalizando meu avatar!</div>
        
        <!-- Personalização de Avatar -->
        <div class="avatar-selector">
          <div class="selector-label">Escolha seu Animal:</div>
          <button class="opt-btn" onclick="updateMyAvatar('animal', '🐱')">🐱</button>
          <button class="opt-btn" onclick="updateMyAvatar('animal', '🐶')">🐶</button>
          <button class="opt-btn" onclick="updateMyAvatar('animal', '🦊')">🦊</button>
          <button class="opt-btn" onclick="updateMyAvatar('animal', '🐼')">🐼</button>
          <button class="opt-btn" onclick="updateMyAvatar('animal', '🐨')">🐨</button>
          <button class="opt-btn" onclick="updateMyAvatar('animal', '🦁')">🦁</button>

          <div class="selector-label">Escolha seu Acessório:</div>
          <button class="opt-btn" onclick="updateMyAvatar('accessory', '')">Nenhum</button>
          <button class="opt-btn" onclick="updateMyAvatar('accessory', '🕶️')">🕶️</button>
          <button class="opt-btn" onclick="updateMyAvatar('accessory', '👑')">👑</button>
          <button class="opt-btn" onclick="updateMyAvatar('accessory', '🎧')">🎧</button>
          <button class="opt-btn" onclick="updateMyAvatar('accessory', '🎩')">🎩</button>
          <button class="opt-btn" onclick="updateMyAvatar('accessory', '✨')">✨</button>

          <div class="selector-label">Cor de Fundo:</div>
          <button class="opt-btn" onclick="updateMyAvatar('bg', '#fee2e2')">🔴</button>
          <button class="opt-btn" onclick="updateMyAvatar('bg', '#dcfce7')">🟢</button>
          <button class="opt-btn" onclick="updateMyAvatar('bg', '#dbeafe')">🔵</button>
          <button class="opt-btn" onclick="updateMyAvatar('bg', '#fef9c3')">🟡</button>
          <button class="opt-btn" onclick="updateMyAvatar('bg', '#f5f3ff')">🟣</button>
        </div>

        <div class="profile-stats">
          <div class="stat"><div class="stat-num">3</div><div class="stat-lbl">Posts</div></div>
          <div class="stat"><div class="stat-num">248</div><div class="stat-lbl">Seguidores</div></div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ===== FEED CENTRAL ===== -->
  <main class="feed" id="feed">
    <div class="card new-post-card">
      <div class="card-header">📝 Nova Publicação</div>
      <div class="card-body">
        <div class="new-post-top">
          <div id="myAvatarPost"></div>
          <textarea id="newPostText" placeholder="O que você está pensando?"></textarea>
        </div>
        <div class="new-post-actions">
          <button class="btn-publish" onclick="publishPost()">Publicar</button>
        </div>
      </div>
    </div>
  </main>

  <!-- ===== SIDEBAR DIREITA ===== -->
  <aside class="sidebar-right">
    <div class="card">
      <div class="card-header">👤 Sugestões</div>
      <div class="card-body" id="suggestions"></div>
    </div>
  </aside>

</div>

<div id="toast"></div>

<script>
  /* ============================================================
     CONFIGURAÇÃO DE AVATAR (SEM IMAGENS)
  ============================================================ */
  
  // Função para gerar o HTML do avatar
  function createAvatarHTML(config, sizeClass = 'avatar-md') {
    return `
      <div class="avatar-box ${sizeClass}" style="background-color: ${config.bg || '#e2e8f0'}">
        <div class="avatar-bg-circle">
          ${config.animal ? `<span class="avatar-emoji">${config.animal}</span>` : `<span style="color:var(--primary)">${config.initials || '?'}</span>`}
        </div>
        ${config.accessory ? `<span class="avatar-accessory">${config.accessory}</span>` : ''}
        <div class="avatar-shape" style="background: radial-gradient(circle, var(--primary) 0%, transparent 70%);"></div>
      </div>
    `;
  }

  let myAvatarConfig = {
    animal: '🐱',
    accessory: '🕶️',
    bg: '#dbeafe',
    initials: 'KV'
  };

  const USERS = [
    { name: 'Lucas Mendes', avatar: { animal: '🐶', accessory: '🎧', bg: '#dcfce7' } },
    { name: 'Ana Paula',    avatar: { animal: '🦊', accessory: '✨', bg: '#fee2e2' } },
    { name: 'Rafael Costa', avatar: { animal: '🦁', accessory: '👑', bg: '#fef9c3' } },
    { name: 'Juliana Souza',avatar: { animal: '🐨', accessory: '🎩', bg: '#f5f3ff' } },
  ];

  let posts = [
    { id: 1, user: USERS[0], time: '2h atrás', text: 'Testando os novos avatares! 🐱🕶️ Ficou muito legal essa ideia de não usar fotos reais.', likes: 12, liked: false, comments: [] },
    { id: 2, user: USERS[1], time: '5h atrás', text: 'Adorei meu avatar de raposinha com brilhos! ✨🦊', likes: 24, liked: false, comments: [] }
  ];

  /* ============================================================
     LOGICA DE ATUALIZAÇÃO
  ============================================================ */

  function updateMyAvatar(type, value) {
    myAvatarConfig[type] = value;
    renderMyAvatars();
    renderAllPosts(); // Atualiza avatares nos posts do usuário
    showToast('Avatar atualizado!');
  }

  function renderMyAvatars() {
    document.getElementById('navMyAvatar').innerHTML = createAvatarHTML(myAvatarConfig, 'avatar-sm');
    document.getElementById('myAvatarLarge').innerHTML = createAvatarHTML(myAvatarConfig, 'avatar-xl');
    document.getElementById('myAvatarPost').innerHTML = createAvatarHTML(myAvatarConfig, 'avatar-md');
  }

  function renderPost(post) {
    const userAvatar = post.user.avatar || myAvatarConfig;
    return `
      <div class="card post-card">
        <div class="post-header">
          ${createAvatarHTML(userAvatar, 'avatar-md')}
          <div class="post-meta">
            <div class="post-author">${post.user.name || 'Você'}</div>
            <div class="post-time">${post.time}</div>
          </div>
        </div>
        <div class="post-text">${post.text}</div>
        <div class="post-actions">
          <button class="action-btn" onclick="showToast('Curtiu!')">❤️ Curtir (${post.likes})</button>
          <button class="action-btn" onclick="showToast('Comentários em breve')">💬 Comentar</button>
        </div>
      </div>
    `;
  }

  function renderAllPosts() {
    const feed = document.getElementById('feed');
    const oldPosts = feed.querySelectorAll('.post-card');
    oldPosts.forEach(p => p.remove());
    posts.forEach(post => feed.insertAdjacentHTML('beforeend', renderPost(post)));
  }

  function renderSuggestions() {
    const el = document.getElementById('suggestions');
    el.innerHTML = USERS.map(u => `
      <div class="suggestion-item">
        ${createAvatarHTML(u.avatar, 'avatar-sm')}
        <div class="suggestion-info">
          <div class="suggestion-name">${u.name}</div>
        </div>
        <button class="btn-follow" onclick="showToast('Seguindo!')">Seguir</button>
      </div>
    `).join('');
  }

  function publishPost() {
    const txt = document.getElementById('newPostText');
    if (!txt.value.trim()) return;
    const newP = { id: Date.now(), user: { name: 'Ketrin Vitória', avatar: {...myAvatarConfig} }, time: 'agora', text: txt.value, likes: 0, comments: [] };
    posts.unshift(newP);
    txt.value = '';
    renderAllPosts();
    showToast('Postado!');
  }

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
  }

  // Init
  renderMyAvatars();
  renderAllPosts();
  renderSuggestions();
</script>
</body>
</html>
