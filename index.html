<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialNet — Sua Rede Social</title>
  <style>
    /* ===== RESET & VARIÁVEIS ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:    #4f46e5;
      --primary-dk: #3730a3;
      --accent:     #ec4899;
      --bg:         #f1f5f9;
      --card:       #ffffff;
      --text:       #1e293b;
      --muted:      #64748b;
      --border:     #e2e8f0;
      --radius:     16px;
      --shadow:     0 4px 20px rgba(0,0,0,.06);
      --nav-h:      60px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== TELA DE LOGIN/CADASTRO ===== */
    #authScreen {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      transition: transform 0.6s cubic-bezier(0.82, 0.01, 0.77, 0.41);
    }
    #authScreen.hidden { transform: translateY(-100%); }

    .auth-card {
      background: #fff; padding: 40px; border-radius: 24px;
      width: 100%; max-width: 420px; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
      text-align: center; position: relative; overflow: hidden;
    }
    .auth-logo { font-size: 2.5rem; font-weight: 800; color: var(--primary); margin-bottom: 5px; }
    .auth-logo span { color: var(--accent); }
    .auth-subtitle { color: var(--muted); margin-bottom: 25px; font-size: 0.9rem; }

    /* Alternância entre Login e Cadastro */
    .auth-forms-container { display: flex; width: 200%; transition: transform 0.4s ease; }
    .auth-form { width: 50%; padding: 0 5px; }
    .auth-card.show-register .auth-forms-container { transform: translateX(-50%); }

    .input-group { text-align: left; margin-bottom: 18px; }
    .input-group label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--text); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .input-group input {
      width: 100%; padding: 12px 16px; border-radius: 12px;
      border: 2px solid var(--border); outline: none; transition: border-color 0.2s; font-size: 0.95rem;
    }
    .input-group input:focus { border-color: var(--primary); }

    .btn-auth {
      width: 100%; background: var(--primary); color: #fff; border: none;
      padding: 14px; border-radius: 12px; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s; margin-top: 10px;
    }
    .btn-auth:hover { background: var(--primary-dk); transform: translateY(-1px); box-shadow: 0 5px 15px rgba(79, 70, 229, 0.3); }

    .auth-switch { margin-top: 20px; font-size: 0.9rem; color: var(--muted); }
    .auth-switch span { color: var(--primary); font-weight: 700; cursor: pointer; text-decoration: underline; }

    /* ===== NAVBAR ===== */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-h); background: var(--primary);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; box-shadow: 0 2px 8px rgba(0,0,0,.2); z-index: 100;
    }
    .nav-logo { font-size: 1.4rem; font-weight: 800; color: #fff; }
    .nav-logo span { color: #a5b4fc; }
    .nav-actions { display: flex; align-items: center; gap: 12px; }

    /* ===== AVATAR SYSTEM ===== */
    .avatar-box {
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden; flex-shrink: 0; user-select: none;
    }
    .avatar-bg-circle { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .avatar-emoji { font-size: 1.8em; z-index: 2; position: relative; margin-top: 10%; }
    .avatar-accessory { position: absolute; top: 5%; left: 50%; transform: translateX(-50%); font-size: 1.2em; z-index: 5; }
    
    .avatar-xl { width: 80px; height: 80px; font-size: 28px; border: 4px solid #fff; box-shadow: var(--shadow); }
    .avatar-md { width: 52px; height: 52px; font-size: 18px; }
    .avatar-sm { width: 36px; height: 36px; font-size: 14px; }

    /* ===== LAYOUT ===== */
    .layout {
      display: grid; grid-template-columns: 280px 1fr 280px; gap: 20px;
      max-width: 1200px; margin: calc(var(--nav-h) + 20px) auto 40px; padding: 0 16px;
    }
    @media (max-width: 1024px) { .layout { grid-template-columns: 240px 1fr; } .sidebar-right { display: none; } }
    @media (max-width: 680px) { .layout { grid-template-columns: 1fr; } .sidebar-left { display: none; } }

    /* ===== CARDS ===== */
    .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 20px; }
    .card-header { padding: 16px 20px; font-weight: 700; border-bottom: 1px solid var(--border); }
    .card-body { padding: 20px; }

    /* ===== SIDEBAR ESQUERDA ===== */
    .profile-card { text-align: center; position: relative; }
    .profile-cover { height: 90px; background: linear-gradient(135deg, var(--primary), var(--accent)); }
    .profile-avatar-wrap { margin-top: -40px; display: flex; justify-content: center; }
    .btn-customize-avatar {
      position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.25); border: none;
      width: 36px; height: 36px; border-radius: 50%; color: #fff; cursor: pointer; font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center; z-index: 10;
    }
    .profile-name { margin-top: 10px; font-weight: 700; font-size: 1.1rem; }
    .profile-bio { font-size: .85rem; color: var(--muted); margin: 6px 0 16px; }

    /* Painel de Personalização */
    .customize-panel {
      display: none; background: #f8fafc; border-top: 1px solid var(--border);
      padding: 20px; text-align: left; max-height: 400px; overflow-y: auto;
    }
    .customize-panel.active { display: block; }
    .selector-group { margin-bottom: 16px; }
    .selector-label { font-size: 0.7rem; color: var(--muted); margin-bottom: 8px; font-weight: 800; text-transform: uppercase; display: block; }
    .options-grid { display: flex; gap: 8px; flex-wrap: wrap; }
    .opt-btn {
      background: #fff; border: 2px solid var(--border); width: 42px; height: 42px; border-radius: 10px;
      cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
    }
    .color-btn { width: 34px; height: 34px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 0 1px var(--border); cursor: pointer; }

    /* ===== FEED ===== */
    .feed { display: flex; flex-direction: column; }
    .new-post-card .card-body { display: flex; flex-direction: column; gap: 15px; }
    .new-post-top { display: flex; gap: 12px; align-items: flex-start; }
    .new-post-top textarea {
      flex: 1; border: 2px solid var(--border); border-radius: 12px; padding: 12px 16px;
      font-size: .95rem; resize: none; font-family: inherit; outline: none; min-height: 80px;
    }
    .btn-publish {
      background: var(--primary); color: #fff; border: none; border-radius: 999px;
      padding: 10px 28px; font-size: .9rem; font-weight: 700; cursor: pointer; align-self: flex-end;
    }

    /* Posts */
    .post-header { padding: 16px 20px 0; display: flex; align-items: center; gap: 12px; }
    .post-meta { flex: 1; }
    .post-author { font-weight: 700; font-size: 1rem; }
    .post-time { font-size: .8rem; color: var(--muted); }
    .post-text { padding: 15px 20px; font-size: 1rem; line-height: 1.6; }
    .post-actions { display: flex; justify-content: space-around; padding: 10px; border-top: 1px solid var(--border); background: #fafafa; }
    .action-btn { flex: 1; background: none; border: none; color: var(--muted); font-size: .9rem; font-weight: 600; padding: 10px; cursor: pointer; }

    /* ===== TOAST ===== */
    #toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: #1e293b; color: #fff; padding: 12px 24px; border-radius: 12px;
      opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 2000;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
  </style>
</head>
<body>

<!-- TELA DE AUTENTICAÇÃO -->
<div id="authScreen">
  <div class="auth-card" id="authCard">
    <div class="auth-logo">Social<span>Net</span></div>
    
    <div class="auth-forms-container">
      <!-- FORMULÁRIO DE LOGIN -->
      <div class="auth-form" id="loginForm">
        <p class="auth-subtitle">Entre na sua conta para continuar</p>
        <div class="input-group">
          <label>Usuário</label>
          <input type="text" id="loginUser" placeholder="Seu usuário" value="ketrin_vitoria">
        </div>
        <div class="input-group">
          <label>Senha</label>
          <input type="password" id="loginPass" placeholder="Sua senha" value="123456">
        </div>
        <button class="btn-auth" onclick="handleAuth('login')">Entrar</button>
        <p class="auth-switch">Não tem uma conta? <span onclick="toggleAuthMode()">Criar conta</span></p>
      </div>

      <!-- FORMULÁRIO DE CADASTRO -->
      <div class="auth-form" id="registerForm">
        <p class="auth-subtitle">Crie sua conta em poucos segundos</p>
        <div class="input-group">
          <label>Nome Completo</label>
          <input type="text" id="regName" placeholder="Ex: Ketrin Vitória">
        </div>
        <div class="input-group">
          <label>Usuário Único</label>
          <input type="text" id="regUser" placeholder="Ex: ketrin_v">
        </div>
        <div class="input-group">
          <label>Senha</label>
          <input type="password" id="regPass" placeholder="Mínimo 6 caracteres">
        </div>
        <button class="btn-auth" onclick="handleAuth('register')">Cadastrar</button>
        <p class="auth-switch">Já tem uma conta? <span onclick="toggleAuthMode()">Fazer Login</span></p>
      </div>
    </div>
  </div>
</div>

<!-- CONTEÚDO DA REDE SOCIAL -->
<nav>
  <div class="nav-logo">Social<span>Net</span></div>
  <div class="nav-actions">
    <button class="nav-btn" onclick="showToast('🔔 Sem notificações')">🔔</button>
    <div id="navMyAvatar"></div>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar-left">
    <div class="card profile-card">
      <button class="btn-customize-avatar" onclick="toggleCustomizePanel()">🎨</button>
      <div class="profile-cover"></div>
      <div class="profile-avatar-wrap" id="myAvatarLarge"></div>
      <div class="card-body" style="padding-top:8px;">
        <div class="profile-name" id="userNameDisplay">Ketrin Vitória</div>
        <div class="profile-bio">Seja bem-vindo(a) de volta! ✨</div>
      </div>

      <div class="customize-panel" id="customizePanel">
        <div class="selector-group">
          <span class="selector-label">Personagem:</span>
          <div class="options-grid">
            <button class="opt-btn" onclick="updateMyAvatar('animal', '👻')">👻</button>
            <button class="opt-btn" onclick="updateMyAvatar('animal', '👾')">👾</button>
            <button class="opt-btn" onclick="updateMyAvatar('animal', '🐱')">🐱</button>
            <button class="opt-btn" onclick="updateMyAvatar('animal', '🤖')">🤖</button>
          </div>
        </div>
        <button class="btn-publish" style="width:100%;" onclick="toggleCustomizePanel()">Salvar</button>
      </div>
    </div>
  </aside>

  <main class="feed" id="feed">
    <div class="card new-post-card">
      <div class="card-body">
        <div class="new-post-top">
          <div id="myAvatarPost"></div>
          <textarea id="newPostText" placeholder="No que você está pensando?"></textarea>
        </div>
        <button class="btn-publish" onclick="publishPost()">Publicar</button>
      </div>
    </div>
  </main>

  <aside class="sidebar-right">
    <div class="card">
      <div class="card-header">👥 Sugestões</div>
      <div class="card-body" id="suggestions"></div>
    </div>
  </aside>
</div>

<div id="toast"></div>

<script>
  // LÓGICA DE AUTENTICAÇÃO
  function toggleAuthMode() {
    document.getElementById('authCard').classList.toggle('show-register');
  }

  function handleAuth(mode) {
    let name, user;
    
    if (mode === 'login') {
      user = document.getElementById('loginUser').value;
      name = user; // Simplificado para o login
    } else {
      name = document.getElementById('regName').value;
      user = document.getElementById('regUser').value;
      if (!name || !user) {
        showToast('⚠️ Preencha todos os campos!');
        return;
      }
    }

    showToast(mode === 'login' ? 'Bem-vindo(a) de volta! ✨' : 'Conta criada com sucesso! 🎉');
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('userNameDisplay').textContent = name;
  }

  // LÓGICA DE AVATAR
  function createAvatarHTML(config, sizeClass = 'avatar-md') {
    return `
      <div class="avatar-box ${sizeClass}" style="background: ${config.bg || '#e2e8f0'}">
        <div class="avatar-bg-circle"><span class="avatar-emoji">${config.animal || '👤'}</span></div>
        ${config.accessory ? `<span class="avatar-accessory">${config.accessory}</span>` : ''}
        <div class="avatar-glow"></div>
      </div>
    `;
  }

  let myAvatarConfig = { animal: '👻', accessory: '👑', bg: 'linear-gradient(45deg, #fbcfe8, #d8b4fe)' };
  const USERS = [{ name: 'Lucas', avatar: { animal: '👾', accessory: '🎧', bg: '#dcfce7' } }];
  let posts = [{ id: 1, user: USERS[0], time: '2h atrás', text: 'Explore as opções de personalização do seu avatar!', likes: 8 }];

  function toggleCustomizePanel() { document.getElementById('customizePanel').classList.toggle('active'); }

  function updateMyAvatar(type, value) {
    myAvatarConfig[type] = value;
    renderMyAvatars();
    renderAllPosts();
    showToast('Estilo atualizado! ✨');
  }

  function renderMyAvatars() {
    document.getElementById('navMyAvatar').innerHTML = createAvatarHTML(myAvatarConfig, 'avatar-sm');
    document.getElementById('myAvatarLarge').innerHTML = createAvatarHTML(myAvatarConfig, 'avatar-xl');
    document.getElementById('myAvatarPost').innerHTML = createAvatarHTML(myAvatarConfig, 'avatar-md');
  }

  function renderPost(post) {
    const userAvatar = post.user.avatar || myAvatarConfig;
    return `
      <div class="card post-card">
        <div class="post-header">
          ${createAvatarHTML(userAvatar, 'avatar-md')}
          <div class="post-meta">
            <div class="post-author">${post.user.name || document.getElementById('userNameDisplay').textContent}</div>
            <div class="post-time">${post.time}</div>
          </div>
        </div>
        <div class="post-text">${post.text}</div>
        <div class="post-actions"><button class="action-btn" onclick="showToast('Curtiu!')">❤️ Curtir (${post.likes})</button></div>
      </div>
    `;
  }

  function renderAllPosts() {
    const feed = document.getElementById('feed');
    feed.querySelectorAll('.post-card').forEach(p => p.remove());
    posts.forEach(post => feed.insertAdjacentHTML('beforeend', renderPost(post)));
  }

  function publishPost() {
    const txt = document.getElementById('newPostText');
    if (!txt.value.trim()) return;
    posts.unshift({ id: Date.now(), user: { name: document.getElementById('userNameDisplay').textContent, avatar: {...myAvatarConfig} }, time: 'agora', text: txt.value, likes: 0 });
    txt.value = '';
    renderAllPosts();
    showToast('Postado! 🚀');
  }

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  renderMyAvatars();
  renderAllPosts();
</script>
</body>
</html>
