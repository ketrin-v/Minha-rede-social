<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialNet — Sua Rede Social</title>
  <style>
    /* ===== RESET & VARIÁVEIS ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:    #4f46e5;
      --primary-dk: #3730a3;
      --accent:     #ec4899;
      --bg:         #f1f5f9;
      --card:       #ffffff;
      --text:       #1e293b;
      --muted:      #64748b;
      --border:     #e2e8f0;
      --radius:     16px;
      --shadow:     0 4px 20px rgba(0,0,0,.06);
      --nav-h:      60px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
    }

    /* ===== TELA DE LOGIN ===== */
    #loginScreen {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; transition: transform 0.6s cubic-bezier(0.82, 0.01, 0.77, 0.41);
    }
    #loginScreen.hidden { transform: translateY(-100%); }

    .login-card {
      background: #fff; padding: 40px; border-radius: 24px;
      width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
      text-align: center;
    }
    .login-logo { font-size: 2.5rem; font-weight: 800; color: var(--primary); margin-bottom: 5px; }
    .login-logo span { color: var(--accent); }

    .btn-google {
      width: 100%; background: #fff; color: #444; border: 2px solid var(--border);
      padding: 12px; border-radius: 12px; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; margin-top: 20px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.2s;
    }
    .btn-google:hover { background: #f8fafc; border-color: #cbd5e1; }

    .divider { margin: 20px 0; display: flex; align-items: center; color: var(--muted); font-size: 0.8rem; }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); margin: 0 10px; }

    .input-group { text-align: left; margin-bottom: 18px; }
    .input-group label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 6px; }
    .input-group input {
      width: 100%; padding: 12px 16px; border-radius: 12px;
      border: 2px solid var(--border); outline: none; transition: border-color 0.2s;
    }

    .btn-login {
      width: 100%; background: var(--primary); color: #fff; border: none;
      padding: 14px; border-radius: 12px; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 70, 229, 0.3); }

    .register-link { margin-top: 25px; font-size: 0.9rem; color: var(--muted); }
    .register-link a { color: var(--primary); font-weight: 700; text-decoration: none; }

    /* ===== NAVBAR ===== */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-h); background: var(--primary);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; box-shadow: 0 2px 8px rgba(0,0,0,.2); z-index: 100;
    }
    .nav-logo { font-size: 1.4rem; font-weight: 800; color: #fff; }
    .nav-logo span { color: #a5b4fc; }
    .nav-actions { display: flex; align-items: center; gap: 12px; }

    /* ===== AVATAR SYSTEM ===== */
    .avatar-box {
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden; flex-shrink: 0; user-select: none;
    }
    .avatar-bg-circle { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .avatar-initials { font-weight: 800; color: #fff; text-transform: uppercase; }
    .avatar-emoji { font-size: 1.8em; z-index: 2; position: relative; margin-top: 10%; }
    .avatar-accessory { position: absolute; top: 5%; left: 50%; transform: translateX(-50%); font-size: 1.2em; z-index: 5; }
    
    .avatar-xl { width: 80px; height: 80px; font-size: 28px; border: 4px solid #fff; box-shadow: var(--shadow); }
    .avatar-md { width: 52px; height: 52px; font-size: 18px; }
    .avatar-sm { width: 36px; height: 36px; font-size: 14px; }

    /* ===== LAYOUT ===== */
    .layout {
      display: grid; grid-template-columns: 280px 1fr 280px; gap: 20px;
      max-width: 1200px; margin: calc(var(--nav-h) + 20px) auto 40px; padding: 0 16px;
    }
    @media (max-width: 1024px) { .layout { grid-template-columns: 240px 1fr; } .sidebar-right { display: none; } }
    @media (max-width: 680px) { .layout { grid-template-columns: 1fr; } .sidebar-left { display: none; } }

    /* ===== CARDS ===== */
    .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 20px; }
    .card-header { padding: 16px 20px; font-weight: 700; border-bottom: 1px solid var(--border); }
    .card-body { padding: 20px; }

    /* ===== SIDEBAR ESQUERDA ===== */
    .profile-card { text-align: center; position: relative; }
    .profile-cover { height: 90px; background: linear-gradient(135deg, var(--primary), var(--accent)); }
    .profile-avatar-wrap { margin-top: -40px; display: flex; justify-content: center; }
    .btn-customize-avatar {
      position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.25); border: none;
      width: 36px; height: 36px; border-radius: 50%; color: #fff; cursor: pointer; font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center; z-index: 10;
    }
    .profile-name { margin-top: 10px; font-weight: 700; font-size: 1.1rem; }
    .profile-bio { font-size: .85rem; color: var(--muted); margin: 6px 0 16px; }

    /* Painel de Personalização */
    .customize-panel {
      display: none; background: #f8fafc; border-top: 1px solid var(--border);
      padding: 20px; text-align: left; max-height: 450px; overflow-y: auto;
    }
    .customize-panel.active { display: block; }
    .selector-group { margin-bottom: 16px; }
    .selector-label { font-size: 0.7rem; color: var(--muted); margin-bottom: 8px; font-weight: 800; text-transform: uppercase; display: block; }
    .options-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(42px, 1fr)); gap: 8px; }
    .opt-btn {
      background: #fff; border: 2px solid var(--border); height: 42px; border-radius: 10px;
      cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .opt-btn:hover { border-color: var(--primary); background: #f1f5f9; }
    .opt-btn.active { border-color: var(--primary); background: #e0e7ff; }

    /* ===== FEED ===== */
    .feed { display: flex; flex-direction: column; }
    .new-post-card .card-body { display: flex; flex-direction: column; gap: 15px; }
    .new-post-top { display: flex; gap: 12px; align-items: flex-start; }
    .new-post-top textarea {
      flex: 1; border: 2px solid var(--border); border-radius: 12px; padding: 12px 16px;
      font-size: .95rem; resize: none; font-family: inherit; outline: none; min-height: 80px;
    }
    .btn-publish {
      background: var(--primary); color: #fff; border: none; border-radius: 999px;
      padding: 10px 28px; font-size: .9rem; font-weight: 700; cursor: pointer; align-self: flex-end;
    }

    /* Posts */
    .post-header { padding: 16px 20px 0; display: flex; align-items: center; gap: 12px; }
    .post-meta { flex: 1; }
    .post-author { font-weight: 700; font-size: 1rem; }
    .post-time { font-size: .8rem; color: var(--muted); }
    .post-text { padding: 15px 20px; font-size: 1rem; line-height: 1.6; }
    .post-actions { display: flex; justify-content: space-around; padding: 10px; border-top: 1px solid var(--border); background: #fafafa; }
    .action-btn { flex: 1; background: none; border: none; color: var(--muted); font-size: .9rem; font-weight: 600; padding: 10px; cursor: pointer; }

    /* ===== TOAST ===== */
    #toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: #1e293b; color: #fff; padding: 12px 24px; border-radius: 12px;
      opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 2000;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
  </style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">Social<span>Net</span></div>
    <p style="color:var(--muted); font-size:0.9rem; margin-bottom:10px;">Entre para ver as novidades!</p>

    <button class="btn-google" onclick="handleGoogleLogin()">
      <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20" alt="Google">
      Entrar com o Google
    </button>

    <div class="divider">ou use sua conta</div>

    <div class="input-group">
      <label>Usuário</label>
      <input type="text" id="loginUser" placeholder="Seu nome de usuário">
    </div>
    <div class="input-group">
      <label>Senha</label>
      <input type="password" id="loginPass" placeholder="Sua senha">
    </div>
    <button class="btn-login" onclick="handleLogin()">Entrar na Rede Social</button>

    <div class="register-link">
      Ainda não tem conta? <a href="cadastro.html">Criar uma conta agora</a>
    </div>
  </div>
</div>

<!-- REDE SOCIAL -->
<nav>
  <div class="nav-logo">Social<span>Net</span></div>
  <div class="nav-actions">
    <button class="nav-btn" onclick="showToast('🔔 Sem notificações')">🔔</button>
    <div id="navMyAvatar"></div>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar-left">
    <div class="card profile-card">
      <button class="btn-customize-avatar" onclick="toggleCustomizePanel()">🎨</button>
      <div class="profile-cover"></div>
      <div class="profile-avatar-wrap" id="myAvatarLarge"></div>
      <div class="card-body" style="padding-top:8px;">
        <div class="profile-name" id="userNameDisplay">Visitante</div>
        <div class="profile-bio">Seja bem-vindo(a)! ✨</div>
      </div>

      <div class="customize-panel" id="customizePanel">
        <div class="selector-group">
          <span class="selector-label">Personagem:</span>
          <div class="options-grid" id="opt-characters"></div>
        </div>
        <div class="selector-group">
          <span class="selector-label">Acessórios:</span>
          <div class="options-grid" id="opt-accessories"></div>
        </div>
        <div class="selector-group">
          <span class="selector-label">Expressões:</span>
          <div class="options-grid" id="opt-expressions"></div>
        </div>
        <div class="selector-group">
          <span class="selector-label">Fundo:</span>
          <div class="options-grid" id="opt-backgrounds"></div>
        </div>
        <button class="btn-publish" style="width:100%; margin-top:10px;" onclick="toggleCustomizePanel()">Salvar Avatar</button>
      </div>
    </div>
  </aside>

  <main class="feed" id="feed">
    <div class="card new-post-card">
      <div class="card-body">
        <div class="new-post-top">
          <div id="myAvatarPost"></div>
          <textarea id="newPostText" placeholder="No que você está pensando?"></textarea>
        </div>
        <button class="btn-publish" onclick="publishPost()">Publicar</button>
      </div>
    </div>
    <div id="emptyFeed" style="text-align:center; padding:40px; color:var(--muted);">
      <p style="font-size:2rem; margin-bottom:10px;">📭</p>
      <p>O feed está vazio. Seja o primeiro a postar algo!</p>
    </div>
  </main>

  <aside class="sidebar-right">
    <div class="card">
      <div class="card-header">👥 Sugestões</div>
      <div class="card-body" id="suggestions">
        <p style="font-size:0.85rem; color:var(--muted); text-align:center;">Nenhuma sugestão no momento.</p>
      </div>
    </div>
  </aside>
</div>

<div id="toast"></div>

<script>
  let currentUser = "Visitante";
  let myAvatarConfig = { 
    animal: '', // Vazio por padrão para mostrar iniciais
    accessory: '', 
    expression: '',
    bg: 'linear-gradient(135deg, #6366f1, #a855f7)' 
  };
  let posts = [];

  const AVATAR_OPTIONS = {
    characters: ['👻', '👾', '🤖', '👽', '💀', '🎃', '🤡', '👺', '👹', '🐲'],
    accessories: ['', '👑', '🎓', '🎩', '🎀', '🎧', '🕶️', '🚀', '⭐', '🔥'],
    expressions: ['', '❤️', '✨', '💭', '💢', '💤', '💎', '🍀', '🎵', '⚡'],
    backgrounds: [
      'linear-gradient(135deg, #6366f1, #a855f7)',
      'linear-gradient(135deg, #f43f5e, #fb923c)',
      'linear-gradient(135deg, #10b981, #3b82f6)',
      'linear-gradient(135deg, #f59e0b, #d946ef)',
      '#1e293b', '#4f46e5', '#ec4899', '#10b981'
    ]
  };

  window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    const newUser = params.get('newUser');
    if (newUser) {
      document.getElementById('loginUser').value = newUser;
      showToast('Conta criada! Agora é só entrar. 🎉');
    }
    initAvatarOptions();
  };

  function getInitials(name) {
    if (!name) return "??";
    const parts = name.trim().split(' ');
    if (parts.length >= 2) {
      return (parts[0][0] + parts[1][0]).toUpperCase();
    }
    return parts[0].substring(0, 2).toUpperCase();
  }

  function handleLogin() {
    const user = document.getElementById('loginUser').value;
    const pass = document.getElementById('loginPass').value;
    if (!user || !pass) { showToast('⚠️ Preencha todos os campos!'); return; }
    
    currentUser = user;
    showToast('Bem-vindo(a), ' + currentUser + '! ✨');
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('userNameDisplay').textContent = currentUser;
    renderMyAvatars();
  }

  function handleGoogleLogin() {
    showToast('Conectando com o Google... 🌐');
    setTimeout(() => {
      currentUser = "Usuário Google";
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('userNameDisplay').textContent = currentUser;
      renderMyAvatars();
    }, 1500);
  }

  function createAvatarHTML(config, sizeClass = 'avatar-md', name = "") {
    const initials = getInitials(name || currentUser);
    
    // Se não houver personagem, mostra iniciais
    const content = config.animal 
      ? `<span class="avatar-emoji">${config.animal}</span>`
      : `<span class="avatar-initials">${initials}</span>`;

    return `
      <div class="avatar-box ${sizeClass}" style="background: ${config.bg}">
        <div class="avatar-bg-circle">${content}</div>
        ${config.accessory ? `<span class="avatar-accessory">${config.accessory}</span>` : ''}
        ${config.expression ? `<span class="avatar-accessory" style="left: 80%; top: 20%; font-size: 0.8em;">${config.expression}</span>` : ''}
      </div>
    `;
  }

  function initAvatarOptions() {
    const gridChar = document.getElementById('opt-characters');
    const gridAcc = document.getElementById('opt-accessories');
    const gridExp = document.getElementById('opt-expressions');
    const gridBg = document.getElementById('opt-backgrounds');

    // Botão para voltar para iniciais
    gridChar.innerHTML = `<button class="opt-btn" onclick="updateMyAvatar('animal', '')">Abc</button>`;
    AVATAR_OPTIONS.characters.forEach(c => {
      gridChar.innerHTML += `<button class="opt-btn" onclick="updateMyAvatar('animal', '${c}')">${c}</button>`;
    });

    AVATAR_OPTIONS.accessories.forEach(a => {
      gridAcc.innerHTML += `<button class="opt-btn" onclick="updateMyAvatar('accessory', '${a}')">${a || '🚫'}</button>`;
    });

    AVATAR_OPTIONS.expressions.forEach(e => {
      gridExp.innerHTML += `<button class="opt-btn" onclick="updateMyAvatar('expression', '${e}')">${e || '🚫'}</button>`;
    });

    AVATAR_OPTIONS.backgrounds.forEach(b => {
      gridBg.innerHTML += `<button class="opt-btn" style="background:${b}" onclick="updateMyAvatar('bg', '${b}')"></button>`;
    });
  }

  function toggleCustomizePanel() { document.getElementById('customizePanel').classList.toggle('active'); }

  function updateMyAvatar(type, value) {
    myAvatarConfig[type] = value;
    renderMyAvatars();
    renderAllPosts();
    if (value === '') {
      showToast('Voltando para as iniciais! 🔤');
    } else {
      showToast('Avatar atualizado! ✨');
    }
  }

  function renderMyAvatars() {
    document.getElementById('navMyAvatar').innerHTML = createAvatarHTML(myAvatarConfig, 'avatar-sm');
    document.getElementById('myAvatarLarge').innerHTML = createAvatarHTML(myAvatarConfig, 'avatar-xl');
    document.getElementById('myAvatarPost').innerHTML = createAvatarHTML(myAvatarConfig, 'avatar-md');
  }

  function renderPost(post) {
    return `
      <div class="card post-card">
        <div class="post-header">
          ${createAvatarHTML(post.user.avatar, 'avatar-md', post.user.name)}
          <div class="post-meta">
            <div class="post-author">${post.user.name}</div>
            <div class="post-time">${post.time}</div>
          </div>
        </div>
        <div class="post-text">${post.text}</div>
        <div class="post-actions"><button class="action-btn" onclick="showToast('Curtiu!')">❤️ Curtir (${post.likes})</button></div>
      </div>
    `;
  }

  function renderAllPosts() {
    const feed = document.getElementById('feed');
    const empty = document.getElementById('emptyFeed');
    feed.querySelectorAll('.post-card').forEach(p => p.remove());
    if (posts.length === 0) { empty.style.display = 'block'; } 
    else { empty.style.display = 'none'; posts.forEach(post => feed.insertAdjacentHTML('beforeend', renderPost(post))); }
  }

  function publishPost() {
    const txt = document.getElementById('newPostText');
    if (!txt.value.trim()) return;
    posts.unshift({ 
      id: Date.now(), 
      user: { name: currentUser, avatar: {...myAvatarConfig} }, 
      time: 'agora', 
      text: txt.value, 
      likes: 0 
    });
    txt.value = '';
    renderAllPosts();
    showToast('Postado! 🚀');
  }

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  renderMyAvatars();
  renderAllPosts();
</script>
</body>
</html>
